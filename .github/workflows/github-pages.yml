# GitHub Pages — gh-pages 브랜치로 정적 사이트 배포
#
# ① 저장소 Settings → Actions → General → Workflow permissions
#    → "Read and write permissions" 선택 후 저장 (토큰이 gh-pages에 푸시하려면 필요)
#
# ② 이 워크플로가 main에 푸시될 때마다 gh-pages 브랜치를 갱신합니다.
#
# ③ Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#    → Branch: gh-pages, Folder: / (root) 저장
#
# ④ 접속: https://sooyachoco.github.io/NXBasic_new/202605_NXlive/live-tv_claude.html

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp -r design-system 202605_NXlive _site/
          echo '<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="refresh" content="0;url=202605_NXlive/live-tv_claude.html"><title>NXBasic</title></head><body><p><a href="202605_NXlive/live-tv_claude.html">Live TV 페이지로 이동</a></p></body></html>' > _site/index.html

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          force_orphan: true
